<body>

    <div class="container">

        <input type="radio" name="tab" id="student" checked>
        <input type="radio" name="tab" id="institution">

        <div class="tabs">
            <label for="student">Student Login</label>
            <label for="institution">Institution Login</label>
        </div>

        <div class="forms">

            <div class="form" id="student-form">
                <h3>Student Login</h3>
                <input type="email" placeholder="Student Email">
                <input type="password" placeholder="Password">
                <button><a href="">Login</a></button>
            </div>

            <div class="form" id="institution-form">
                <h3>Institution Login</h3>
                <input type="text" placeholder="Institution ID">
                <input type="password" placeholder="Password">
                <button><a href="landingpage.html">Login</a></button>
            </div>

        </div>

    </div>

</body>
