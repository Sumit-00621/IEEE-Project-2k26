<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SkillDev Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Radio Buttons -->
        <input type="radio" name="tab" id="student" checked>
        <input type="radio" name="tab" id="institution">
        <input type="radio" name="tab" id="mentor">

        <!-- Tabs -->
        <div class="tabs">
            <label for="student">Student</label>
            <label for="institution">Institution</label>
            <label for="mentor">Mentor</label>
        </div>

        <!-- Forms -->
        <div class="forms">

            <!-- Student -->
            <div class="form" id="student-form">
                <h3>Student Login</h3>
                <input type="email" placeholder="Student Email" required>
                <input type="password" placeholder="Password" required>
                <button><a href="student.html">Login</a></button>
                <p class="register">New student? <a href="#">Register</a></p>
            </div>

            <!-- Institution -->
            <div class="form" id="institution-form">
                <h3>Institution Login</h3>
                <input type="text" placeholder="Institution ID" required>
                <input type="password" placeholder="Password" required>
                <button><a href="landingpage.html">Login</a></button>
                <p class="register">Register institution? <a href="#">Click here</a></p>
            </div>

            <!-- Mentor -->
            <div class="form" id="mentor-form">
                <h3>Mentor Login</h3>
                <input type="email" placeholder="Mentor Email" required>
                <input type="password" placeholder="Password" required>
                <button><a href="mentor.html">Login</a></button>
                <p class="register">Become a mentor? <a href="#">Apply here</a></p>
            </div>

        </div>

    </div>

</body>

</html>
